[[items]]
title = "VLM / VLA 算法实习生"
subtitle = "卧安机器人"
date = "2025.11 - 2026.02"
content = """
围绕双臂机器人操作任务参与 VLA 数据、训练和部署闭环，工作覆盖 Isaac Sim/Isaac Lab
仿真环境、UMI 真机数据采集、pi0.5/ACT 训练，以及模型输出到机械臂控制接口的适配。

**仿真数据与训练：**在 Isaac Lab 中搭建桌面 Pick-and-Place 场景、相机、夹爪和任务
资产，脚本化生成多视角图像、语言指令、双臂末端位姿和夹爪状态。基于仿真轨迹完成
pi0.5 VLA 微调，并在 Isaac Sim 中接入模型推理，验证从视觉观察和任务指令到机器人动作
的闭环执行。

**真机数据与行为克隆：**接入多厂家 UMI 真机数据，统一多视角图像、任务文本、双臂
末端 pose、夹爪状态、坐标系和控制频率，构造 ACT 行为克隆训练样本。训练侧支持冻结
VLM 的 Expert-only 策略，以及 Vision LoRA + Expert 策略，将模型动作空间适配为双臂
16D Delta Pose。

**真机推理部署：**实现 16D Delta Pose 在线累积、坐标变换和动作限幅，将模型输出转换
为双臂目标末端位姿和夹爪命令；通过固定消息协议对接控制侧 IK 求解与机械臂执行，完成
从图像、语言指令到真机动作的实时闭环。
"""
videoGroupTitle = "卧安 Demo：仿真数据、仿真推理、真机 UMI 与真机推理"
videos = [
