[[items]]
title = "VLM / VLA 算法实习生"
subtitle = "腾讯 IEG / Turing Lab"
date = "2026.03 - 至今"
content = """
参与通用游戏 Agent 研发，采用“**大脑规划 + 小脑执行**”架构：大脑负责长程任务
拆解、导航/战斗模型切换及 OOD 状态处理，小脑负责将视觉观察和自然语言指令转换为
可执行键鼠动作。个人主要负责小脑侧从数据、训练到在线推理评测的闭环，包括导航
COT 指令遵循、战斗 SFT/RL 以及 vLLM 实机部署。

**数据处理与标注：**搭建每日轨迹处理流水线，从 COS 同步游戏日志、视频和 proto
动作，统一下采样到 20 FPS，并按时间戳对齐画面、键盘、鼠标位移和环境状态。流水线
会过滤死亡、菜单、卡顿、不可操作等低质量片段，裁剪高质量 clip，并结合 E2E 标注和
L2 Reference 标注生成可训练 instruction。最终完成帧号补齐、动作合法性检查、样本
schema 校验和 S3 发布，使导航 SFT、战斗 SFT/RL、推理回放使用同一套标准数据。

**COT 导航小脑：**基于 Qwen3.5-4B 训练导航指令遵循模型。数据构造上，先由 Gemini
结合视频观察和真实动作轨迹生成变长 Thinking Point，每个 TP 描述当前局部目标、视角
调整和移动意图；训练样本再将若干 TP 组织成短程 Think-Act 片段，让模型在看到当前帧
和历史上下文后先输出推理，再输出 action chunk。动作协议采用 V3 累计角度格式，将
200ms 窗口内的多个 mouse delta 聚合成角度动作，并和键盘动作共同 tokenizer 成监督
目标。训练时区分 thinking/action token 的监督权重，重点让模型学会 xy 角度、按键组合
和 `stop` 时机，在导航测试集 **Pass@1 达到 70.7%**。

**战斗小脑 SFT/RL：**参与战斗模型训练闭环。Rollout 阶段，当前 policy 在实机战斗中
根据画面和历史动作每 200ms 输出一个 action group，客户端执行后回传 Boss 血量、玩家
血量、体力、距离、棍势和战斗事件等状态，形成一局 session。系统将 session 写入
replay buffer，并根据伤害、存活、受击、距离控制等信号计算 step reward 和轨迹 reward。
训练阶段按连续控制者将 session 切成 model/human segment，再切成多轮视觉对话 chunk：
模型产生的轨迹使用无 Critic 的 Token-level PPO-Clip 做 policy update，人类接管轨迹
使用 SFT Cross Entropy 做动作模仿，从而同时保留探索收益和专家操作稳定性。

**推理与自动评测：**基于 vLLM 搭建小脑在线推理服务，实现最新帧消费、COT/V3 Action
流式解析、动作合法化、`stop` 判断、指令切换中断和导航/战斗模型路由。评测侧打通任务
下发、游戏录制、轨迹回放、成功判定和失败样本回收，形成“数据采集 -> 训练 -> 实机验证
-> 回流修正”的迭代闭环。
"""
videoGroupTitle = "小脑 Demo：COT 导航与战斗执行"
videos = [
    { title = "COT 导航：寺庙", src = "/demos/navigation/temple.mp4", description = "根据大脑下发的长程导航指令，小脑结合当前视野进行局部路径跟随和视角控制。" },
    { title = "COT 导航：灵芝", src = "/demos/navigation/lingzhi.mp4", description = "通过 Thinking Point 拆解短程子目标，并输出连续 action chunk 完成采集/到达任务。" },
    { title = "COT 导航：转身穿过木桥", src = "/demos/navigation/wooden-bridge-turn.mp4", description = "展示转向、过桥等需要视角调整与移动协同的导航指令遵循能力。" },
    { title = "战斗：大头", src = "/demos/combat/big-head.mp4", description = "战斗小脑基于画面状态输出连续键鼠动作，完成接近、闪避和攻击节奏控制。" },
    { title = "战斗：白衣秀士", src = "/demos/combat/white-clad-noble.mp4", description = "展示模型在 Boss 战中的动作决策、距离保持和技能释放时机。" },
    { title = "战斗：黑熊精", src = "/demos/combat/black-bear-spirit.mp4", description = "展示战斗策略在高压场景下的连续操作和闭环反馈执行效果。" },
]
