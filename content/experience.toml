[[items]]
title = "VLM / VLA Algorithm Intern"
subtitle = "Tencent IEG / Turing Lab"
date = "Mar 2026 - Present"
content = """
Worked on a general game agent built with a **cortex-planner + cerebellum-actor**
architecture. The cortex decomposes long-horizon tasks, routes between navigation
and combat policies, and handles OOD states; the cerebellum converts visual
observations and natural-language instructions into executable keyboard/mouse
actions. I focused on the cerebellum-side data pipeline, COT navigation SFT,
combat SFT/RL, inference, and evaluation.

**Data:** Built a daily trajectory pipeline covering COS synchronization,
20 FPS video/proto action resampling, quality filtering, clip trimming,
E2E/L2-reference instruction annotation, frame alignment, validation, and S3
publishing for both navigation and combat training.

**COT navigation:** Fine-tuned a Qwen3.5-4B navigation actor with Gemini-derived,
action-grounded variable-length thinking points. Implemented the V3 cumulative
degree action protocol, merged mouse deltas into angle-level actions, and applied
grouped supervision over thinking/action tokens, reaching **70.7% Pass@1** on the
navigation test set.

**Combat policy:** Worked on combat SFT and online RL. The rollout service lets
the policy play real battles in 200ms action groups, records sessions into replay
buffers, and computes rewards from boss HP, player HP, stamina, distance, and
combat state. The trainer chunks sessions into token-level samples, applies
critic-free PPO-Clip on model-generated actions, and uses SFT CE on human-takeover
segments.

**Inference and evaluation:** Implemented vLLM streaming COT/V3 action parsing,
latest-frame consumption, stop/abort semantics, navigation-combat routing, and
automated in-game evaluation covering task dispatch, video recording, action
execution, and success judgement.
"""
