[[items]]
title = "VLM / VLA Algorithm Intern"
subtitle = "Woan Robotics"
date = "Nov 2025 - Feb 2026"
content = """
Worked on the data, training, and deployment loop for dual-arm robotic
manipulation, covering Isaac Sim / Isaac Lab simulation, UMI real-robot data
collection, pi0.5 / ACT training, and action adaptation from model output to the
robot control interface.

**Simulation data and training:** Built tabletop pick-and-place scenes, cameras,
grippers, and task assets in Isaac Lab. Scripted collection of multi-view images,
language instructions, dual-arm end-effector poses, and gripper states. Fine-tuned
a pi0.5 VLA policy on simulation trajectories and connected the policy to Isaac
Sim for closed-loop inference validation.

**Real-robot data and behavior cloning:** Integrated heterogeneous multi-vendor
UMI data and normalized multi-view images, task text, dual-arm poses, gripper
states, coordinate systems, and control frequency. Constructed ACT behavior
cloning samples and supported both Expert-only and Vision-LoRA-plus-Expert
training strategies with a dual-arm 16D delta-pose action space.

**Real-robot deployment:** Implemented online accumulation, coordinate conversion,
and action clipping for 16D Delta Pose outputs, then converted model predictions
into target end-effector poses and gripper commands. Integrated the inference
output with the control-side IK interface through a fixed message protocol,
closing the real-time loop from images and language instructions to robot actions.
"""
