[[items]]
title = "VLM / VLA Algorithm Intern"
subtitle = "Tencent IEG / Turing Lab"
date = "Mar 2026 - Present"
content = """
Worked on a general game agent built with a **cortex-planner + cerebellum-actor**
architecture. The cortex decomposes long-horizon tasks, routes between navigation
and combat policies, and handles OOD states; the cerebellum converts visual
observations and natural-language instructions into executable keyboard/mouse
actions. I focused on the cerebellum-side full loop: data processing, COT
navigation instruction following, combat SFT/RL, vLLM inference, and in-game
evaluation.

**Data and annotation:** Built a daily trajectory pipeline that synchronizes game
videos, proto actions, and logs from COS, resamples observations and keyboard/mouse
actions to 20 FPS, and aligns them by timestamp. The pipeline filters invalid
segments such as death, menus, stalls, and non-controllable states, trims high
quality clips, and generates trainable instructions from E2E annotations and
L2-reference labels. It also performs frame completion, action validation, schema
checks, and S3 publishing so navigation SFT, combat SFT/RL, and inference replay
share the same standardized data format.

**COT navigation actor:** Fine-tuned a Qwen3.5-4B navigation actor for
instruction following. In data construction, Gemini reads the video observation
and ground-truth action trace to produce variable-length thinking points that
describe local goals, camera adjustments, and movement intent. Training samples
then organize multiple thinking points into short-horizon Think-Act segments, so
the model predicts reasoning followed by an executable action chunk from the
current frame and history. The V3 action protocol aggregates mouse deltas within
a 200ms window into cumulative degree-level actions and combines them with
keyboard actions as tokenized targets. Grouped supervision emphasizes xy angle
tokens, key combinations, and `stop` timing, reaching **70.7% Pass@1** on the
navigation test set.

**Combat actor SFT/RL:** Worked on the combat training loop. During rollout, the
current policy plays real battles and emits one action group every 200ms. The
client executes the action and returns boss HP, player HP, stamina, distance,
focus points, and combat events, forming a complete session. Sessions are written
to the replay buffer, where rewards are computed from damage, survival, hit
avoidance, distance control, and trajectory-level outcomes. During training,
sessions are split by controller into model/human segments and then into
multi-turn visual-dialogue chunks. Model-generated segments use critic-free
token-level PPO-Clip for policy updates, while human takeover segments use SFT
cross entropy for imitation, combining exploration gains with stable expert
behavior.

**Inference and evaluation:** Built the online cerebellum inference service with
vLLM, including latest-frame consumption, streaming COT/V3 action parsing, action
sanitization, `stop` judgement, instruction-switch interruption, and navigation
/ combat policy routing. The evaluation loop handles task dispatch, game video
recording, trajectory replay, success judgement, and failure-case collection,
closing the iteration loop from data collection to training, in-game validation,
and data refinement.
"""
